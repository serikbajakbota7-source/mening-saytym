<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimTech — Сабақтар</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap');

        /* НЕГІЗГІ СТИЛЬДЕР - Крем және Зәйтүн палитрасы */
        :root { 
            --bg-color: #f4f1ea; 
            --sidebar-bg: #ffffff;
            --header-bg: #4a5d4a; 
            --text-color: #2c3e50;
            --card-bg: #ffffff;
            --accent: #d4a373; 
            --border: #e2e8f0;
            --terminal-bg: #1e293b;
            --primary: #4a5d4a;
        }

        /* Түнгі режим түстері */
        .dark-mode {
            --bg-color: #1b1b1b;
            --sidebar-bg: #2d2d2d;
            --header-bg: #000000;
            --text-color: #e0e0e0;
            --card-bg: #2d2d2d;
            --accent: #ebdf58e1;
            --border: #444;
            --terminal-bg: #000000;
            --primary: #ebdf58e1;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg-color); color: var(--text-color); height: 100vh; overflow: hidden; }

        .app-container { display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--sidebar-bg); }
        .sidebar-header { padding: 25px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        
        .mode-toggle { cursor: pointer; font-size: 24px; color: var(--accent); }

        .task-list { flex: 1; overflow-y: auto; padding: 20px; }
        .task-node {
            padding: 15px; margin-bottom: 10px; border-radius: 12px; font-size: 14px;
            display: flex; align-items: center; gap: 12px; cursor: not-allowed; opacity: 0.4;
            background: var(--bg-color); border: 1px solid var(--border);
        }
        .task-node.unlocked { cursor: pointer; opacity: 1; }
        .task-node.active { background: var(--header-bg); color: white; border-color: var(--header-bg); opacity: 1; }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .theory-section { height: 42%; padding: 35px; overflow-y: auto; border-bottom: 1px solid var(--border); background: var(--card-bg); }
        .label { font-size: 12px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
        
        .practice-section { flex: 1; display: flex; padding: 20px; gap: 20px; background: var(--bg-color); }
        .editor-box { flex: 1; display: flex; flex-direction: column; background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        .editor-nav { padding: 12px 20px; background: var(--header-bg); color: white; display: flex; justify-content: space-between; align-items: center; }
        
        #code-input { flex: 1; padding: 20px; font-family: 'JetBrains Mono'; font-size: 16px; border: none; outline: none; background: transparent; color: var(--text-color); }
        
        .terminal { width: 350px; background: var(--terminal-bg); border-radius: 15px; padding: 20px; color: #10b981; font-family: 'JetBrains Mono'; font-size: 14px; }

        .btn-run { background: var(--accent); color: white; border: none; padding: 8px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-next { background: #10b981; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px; }
        
        code { background: rgba(212, 163, 115, 0.2); padding: 2px 6px; border-radius: 4px; color: var(--accent); }
    </style>
</head>
<body class="light-mode">

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <button onclick="location.href='/home'" style="background:none; border:none; cursor:pointer; font-size:20px; color:var(--text-color);"><i class='bx bx-left-arrow-alt'></i></button>
                <h3 id="cur-lang" style="font-size: 18px;">Python</h3>
            </div>
            <i class='bx bx-moon mode-toggle' id="modeBtn" onclick="toggleMode()"></i>
        </div>
        <div id="task-list" class="task-list"></div>
    </aside>

    <main class="main-content">
        <div class="theory-section">
            <div class="label">📖 Теориялық бөлім</div>
            <div id="theory-content" class="theory-text" style="font-size: 16px; line-height: 1.6;"></div>
            <div class="label" style="margin-top: 25px;">🎯 Тапсырма</div>
            <div id="task-text" style="font-weight: 600; font-size: 18px; color: var(--header-bg);"></div>
        </div>

        <div class="practice-section">
            <div class="editor-box">
                <div class="editor-nav">
                    <span id="file-name">main.py</span>
                    <button class="btn-run" onclick="checkCode()">Іске қосу</button>
                </div>
                <textarea id="code-input" spellcheck="false" placeholder="Кодты осында жазыңыз..."></textarea>
            </div>
            <div class="terminal">
                <div style="font-size: 10px; color: #64748b; margin-bottom: 10px;">КОНСОЛЬ</div>
                <div id="out">> Күтуде...</div>
            </div>
        </div>
    </main>
</div>

<script>
const lessonsData = {
    'Python': [
        { title: "1. Кіріспе: print()", theory: "Python-да мәліметті экранға шығару үшін <code>print()</code> қолданылады.", task: "'Salem' сөзін экранға шығарыңыз.", check: "print('Salem')", hint: "print('Salem') жазыңыз" },
        { title: "2. Айнымалылар", theory: "Айнымалы — мәнді сақтауға арналған орын. Мысалы: <code>x = 10</code>", task: "x айнымалысына 5 санын меншіктеңіз.", check: "x=5", hint: "x = 5" },
        { title: "3. Математика", theory: "Python сандармен есептеуге өте ыңғайлы.", task: "print(10 + 5) кодын жазыңыз.", check: "print(10+5)", hint: "10 мен 5-ті қосыңыз" }
    ],
    'C#': [{ title: "1. Кіріспе", theory: "C#-та <code>Console.WriteLine()</code> қолданылады.", task: "'Hi' деп шығарыңыз.", check: "Console.WriteLine('Hi')", hint: "Console.WriteLine('Hi')" }],
    'C++': [{ title: "1. Кіріспе", theory: "C++-те <code>std::cout</code> қолданылады.", task: "'Hello' деп шығарыңыз.", check: "std::cout<<'Hello'", hint: "std::cout << 'Hello';" }]
};

// 20 сабаққа толтыру
['Python', 'C#', 'C++'].forEach(lang => {
    for(let i = lessonsData[lang].length; i < 20; i++) {
        lessonsData[lang].push({
            title: (i+1) + ". Сабақ",
            theory: "Кезекті тақырыпты меңгеру.",
            task: "lesson" + (i+1) + " деп жазыңыз.",
            check: "lesson" + (i+1),
            hint: "lesson" + (i+1)
        });
    }
});

let curLang = 'Python', curIdx = 0, unlocked = 0;

window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    curLang = params.get('lang') || 'Python';
    document.getElementById('cur-lang').innerText = curLang + " Курсы";
    
    // Прогресті браузерден алу
    unlocked = parseInt(localStorage.getItem(`unl_${curLang}`)) || 0;
    curIdx = unlocked;

    // Түнгі режимді тексеру
    if(localStorage.getItem('theme') === 'dark') toggleMode();
    
    renderList();
    loadLesson();
};

function toggleMode() {
    const body = document.body;
    const btn = document.getElementById('modeBtn');
    body.classList.toggle('dark-mode');
    
    if(body.classList.contains('dark-mode')) {
        btn.className = 'bx bx-sun mode-toggle';
        localStorage.setItem('theme', 'dark');
    } else {
        btn.className = 'bx bx-moon mode-toggle';
        localStorage.setItem('theme', 'light');
    }
}

function renderList() {
    const list = document.getElementById('task-list');
    list.innerHTML = '';
    lessonsData[curLang].forEach((l, i) => {
        const isUnlocked = i <= unlocked;
        const node = document.createElement('div');
        node.className = `task-node ${isUnlocked ? 'unlocked' : ''} ${i === curIdx ? 'active' : ''}`;
        const icon = i < unlocked ? 'bxs-check-circle' : (isUnlocked ? 'bx-play-circle' : 'bx-lock-alt');
        node.innerHTML = `<i class='bx ${icon}'></i> <span>${l.title}</span>`;
        if(isUnlocked) node.onclick = () => { curIdx = i; renderList(); loadLesson(); };
        list.appendChild(node);
    });
}

function loadLesson() {
    const l = lessonsData[curLang][curIdx];
    document.getElementById('theory-content').innerHTML = l.theory;
    document.getElementById('task-text').innerText = l.task;
    document.getElementById('code-input').value = "";
    document.getElementById('out').innerHTML = "> Дайын...";
}

function checkCode() {
    const code = document.getElementById('code-input').value.replace(/\s+/g,'').replace(/['"]/g, '"');
    const correct = lessonsData[curLang][curIdx].check.replace(/\s+/g,'').replace(/['"]/g, '"');
    const out = document.getElementById('out');

    if(code.includes(correct)) {
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        out.innerHTML = `<span style="color: #10b981;">> КЕРЕМЕТ! ✅</span><br>Тапсырма орындалды.`;
        
        if(curIdx === unlocked && unlocked < 19) {
            unlocked++;
            localStorage.setItem(`unl_${curLang}`, unlocked);
            renderList();
        }
        
        if(curIdx < 19) {
            const btn = document.createElement('button');
            btn.className = "btn-next";
            btn.innerText = "КЕЛЕСІ САБАҚ →";
            btn.onclick = () => { curIdx++; renderList(); loadLesson(); };
            out.appendChild(btn);
        }
    } else {
        out.innerHTML = `<span style="color: #ef4444;">> ҚАТЕ! ❌</span><br><small>Көмек: ${lessonsData[curLang][curIdx].hint}</small>`;
    }
}
</script>
</body>
</html>
