<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimTech — Адаптивті Платформа</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap');

        :root { 
            --bg-color: #f4f1ea; 
            --sidebar-bg: #ffffff;
            --header-bg: #4a5d4a; 
            --text-color: #2c3e50;
            --card-bg: #ffffff;
            --accent: #d4a373; 
            --border: #e2e8f0;
            --terminal-bg: #1e293b;
        }

        .dark-mode {
            --bg-color: #1b1b1b;
            --sidebar-bg: #2d2d2d;
            --header-bg: #000000;
            --text-color: #e0e0e0;
            --card-bg: #2d2d2d;
            --accent: #ebdf58e1;
            --border: #444;
            --terminal-bg: #000000;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); min-height: 100vh; overflow-x: hidden; }

        /* Контейнерді икемді ету */
        .app-container { display: flex; height: 100vh; }

        /* Sidebar стилі және адаптивтілігі */
        .sidebar { 
            width: 320px; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            background: var(--sidebar-bg); 
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        /* Негізгі контент */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }

        /* Теория бөлімі */
        .theory-section { padding: 30px; background: var(--card-bg); border-bottom: 1px solid var(--border); }

        /* Практика бөлімі (редактор мен консоль) */
        .practice-section { 
            display: flex; 
            padding: 20px; 
            gap: 20px; 
            flex: 1; 
            min-height: 500px;
        }

        .editor-box { flex: 2; display: flex; flex-direction: column; background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border); min-height: 300px; }
        .terminal { flex: 1; background: var(--terminal-bg); border-radius: 15px; padding: 20px; color: #10b981; font-family: 'JetBrains Mono'; }

        /* Мобильдік құрылғылар үшін Media Queries (Экран 768px-ден кіші болса) */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; height: auto; }
            
            .sidebar { 
                position: fixed; 
                left: -320px; 
                top: 0; 
                bottom: 0; 
                box-shadow: 10px 0 15px rgba(0,0,0,0.1);
            }
            .sidebar.open { left: 0; }

            .practice-section { flex-direction: column; }
            
            .theory-section { padding: 20px; }
            
            .terminal { width: 100%; min-height: 150px; }

            /* Мобильдік мәзір батырмасы (бургер) */
            .mobile-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 15px;
                background: var(--header-bg);
                color: white;
            }
        }

        /* Жасырын элементтерді көрсету */
        .mobile-header { display: none; }
        @media (max-width: 768px) { .mobile-header { display: flex; } }

        /* Батырмалар стилі */
        .btn-run { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 800; }
        #code-input { width: 100%; height: 250px; padding: 15px; font-family: 'JetBrains Mono'; border: none; outline: none; background: transparent; color: var(--text-color); resize: none; }
    </style>
</head>
<body>

    <div class="mobile-header">
        <i class='bx bx-menu' id="menu-icon" style="font-size: 30px; cursor: pointer;"></i>
        <h4 id="mob-title">Python</h4>
        <i class='bx bx-moon' onclick="toggleMode()" style="font-size: 24px;"></i>
    </div>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header" style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                <h3 style="font-size: 18px;">BilimTech</h3>
                <i class='bx bx-x' id="close-menu" style="font-size: 30px; cursor: pointer; display: none;"></i>
            </div>
            <div id="task-list" class="task-list" style="overflow-y: auto; padding: 15px;"></div>
        </aside>

        <main class="main-content">
            <div class="theory-section">
                <div style="color: var(--accent); font-weight: 800; font-size: 12px; letter-spacing: 1px;">📖 ТЕОРИЯ</div>
                <div id="theory-content" style="margin-top: 10px; font-size: 16px;"></div>
                <div style="margin-top: 20px; padding: 15px; background: var(--bg-color); border-radius: 10px; border-left: 4px solid var(--accent);">
                    <strong>Тапсырма:</strong> <span id="task-text"></span>
                </div>
            </div>

            <div class="practice-section">
                <div class="editor-box">
                    <div style="padding: 10px 20px; background: var(--header-bg); color: white; display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 12px;">main.py</span>
                        <button class="btn-run" onclick="checkCode()">Іске қосу</button>
                    </div>
                    <textarea id="code-input" spellcheck="false" placeholder="Кодты осында жазыңыз..."></textarea>
                </div>

                <div class="terminal">
                    <div style="font-size: 10px; opacity: 0.6; margin-bottom: 10px;">КОНСОЛЬ</div>
                    <div id="out">> Дайын...</div>
                </div>
            </div>
        </main>
    </div>

<script>
    // Мобильдік мәзірді ашу/жабу логикасы
    const menuIcon = document.getElementById('menu-icon');
    const closeMenu = document.getElementById('close-menu');
    const sidebar = document.getElementById('sidebar');

    if(menuIcon) {
        menuIcon.onclick = () => { sidebar.classList.add('open'); closeMenu.style.display = 'block'; }
    }
    if(closeMenu) {
        closeMenu.onclick = () => { sidebar.classList.remove('open'); closeMenu.style.display = 'none'; }
    }

    // Режим ауыстыру (Dark/Light)
    function toggleMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // Сабақтар базасы (Алдыңғы кодымыздағыдай)
    const lessonsData = {
        'Python': [
            { title: "1. Кіріспе", theory: "Python-да <code>print()</code> қолданылады.", task: "'Salem' деп шығарыңыз.", check: "print('Salem')", hint: "print('Salem')" },
            { title: "2. Айнымалылар", theory: "Айнымалы: <code>x = 10</code>", task: "x айнымалысына 5-ті меншіктеңіз.", check: "x=5", hint: "x = 5" }
        ]
    };

    let curLang = 'Python', curIdx = 0, unlocked = 0;

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        curLang = params.get('lang') || 'Python';
        document.getElementById('mob-title').innerText = curLang;
        
        unlocked = parseInt(localStorage.getItem(`unl_${curLang}`)) || 0;
        curIdx = unlocked;

        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
        
        renderList();
        loadLesson();
    };

    function renderList() {
        const list = document.getElementById('task-list');
        list.innerHTML = '';
        const lessons = lessonsData[curLang] || lessonsData['Python'];
        
        lessons.forEach((l, i) => {
            const isUnlocked = i <= unlocked;
            const node = document.createElement('div');
            node.style.padding = "12px";
            node.style.marginBottom = "8px";
            node.style.borderRadius = "10px";
            node.style.cursor = isUnlocked ? "pointer" : "not-allowed";
            node.style.opacity = isUnlocked ? "1" : "0.4";
            node.style.background = i === curIdx ? "var(--header-bg)" : "var(--bg-color)";
            node.style.color = i === curIdx ? "white" : "var(--text-color)";
            node.style.border = "1px solid var(--border)";
            
            node.innerHTML = `<i class='bx ${i < unlocked ? 'bxs-check-circle' : 'bx-play'}'></i> ${l.title}`;
            
            if(isUnlocked) {
                node.onclick = () => { 
                    curIdx = i; 
                    renderList(); 
                    loadLesson(); 
                    if(window.innerWidth <= 768) sidebar.classList.remove('open');
                };
            }
            list.appendChild(node);
        });
    }

    function loadLesson() {
        const lessons = lessonsData[curLang] || lessonsData['Python'];
        const l = lessons[curIdx];
        document.getElementById('theory-content').innerHTML = l.theory;
        document.getElementById('task-text').innerText = l.task;
        document.getElementById('code-input').value = "";
    }

    function checkCode() {
        const code = document.getElementById('code-input').value.replace(/\s+/g,'').replace(/['"]/g, '"');
        const lessons = lessonsData[curLang] || lessonsData['Python'];
        const correct = lessons[curIdx].check.replace(/\s+/g,'').replace(/['"]/g, '"');
        const out = document.getElementById('out');

        if(code.includes(correct)) {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            out.innerHTML = `<span style="color: #10b981;">> КЕРЕМЕТ! ✅</span>`;
            if(curIdx === unlocked && unlocked < lessons.length - 1) {
                unlocked++;
                localStorage.setItem(`unl_${curLang}`, unlocked);
                renderList();
            }
        } else {
            out.innerHTML = `<span style="color: #ef4444;">> ҚАТЕ! ❌</span>`;
        }
    }
</script>
</body>
</html>
