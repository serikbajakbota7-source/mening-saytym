<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Signup Form</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        /* Стильдерің өзгеріссіз қалады, сондықтан оны қысқартып жазбадым */
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap");
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; text-decoration: none; list-style: none; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(90deg, #f6f5f2, #cae1d0); }
        .container { position: relative; width: 850px; height: 550px; background: #fff; margin: 20px; border-radius: 30px; box-shadow: 0 0 30px rgba(0, 0, 0, 0.2); overflow: hidden; }
        .form-box { position: absolute; right: 0; width: 50%; height: 100%; background: #fff; display: flex; align-items: center; padding: 40px; z-index: 1; transition: 0.6s ease-in-out 1.2s; }
        .container.active .form-box { right: 50%; }
        .form-box.register { visibility: hidden; }
        .container.active .form-box.register { visibility: visible; transition-delay: 1.2s; }
        .input-box { position: relative; margin: 30px 0; }
        .input-box input { width: 100%; padding: 13px 50px 13px 20px; background: #fffcf7; border-radius: 8px; border: 1px solid #ddd; outline: none; font-size: 16px; }
        .input-box i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 20px; }
        .btn, .btn-start { width: 100%; height: 48px; background: #4a5d4a; border-radius: 8px; border: none; cursor: pointer; font-size: 16px; color: #fff; font-weight: 600; display: flex; justify-content: center; align-items: center; margin-top: 10px; }
        .btn-start { background: #6b826b; }
        .toggle-box { position: absolute; width: 100%; height: 100%; }
        .toggle-box::before { content: ""; position: absolute; left: -250%; width: 300%; height: 100%; background: #4a5d4a; border-radius: 150px; z-index: 2; transition: 1.8s ease-in-out; }
        .container.active .toggle-box::before { left: 50%; }
        .toggle-panel { position: absolute; width: 50%; height: 100%; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2; transition: 0.6s ease-in-out; }
        .toggle-left { left: 0; transition-delay: 1.2s; }
        .container.active .toggle-left { left: -50%; transition-delay: 0.6s; }
        .toggle-right { right: -50%; transition-delay: 0.6s; }
        .container.active .toggle-right { right: 0; transition-delay: 1.2s; }
        .toggle-panel .btn { width: 160px; background: transparent; border: 2px solid #fff; }
        @media (max-width: 650px) { .container { width: 100%; height: 100vh; border-radius: 0; } .form-box { width: 100%; height: 70%; bottom: 0; } .toggle-box { display: none; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-box login">
            <form action="/login" method="POST">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" name="username" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" name="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn">КІРУ</button>
                <a href="/home" class="btn-start">Таңдау арқылы өту</a>
            </form>
        </div>

        <div class="form-box register">
            <form action="/register_user" method="POST">
                <h1>Registration</h1>
                <div class="input-box">
                    <input type="text" name="fullname" placeholder="Full Name" required>
                    <i class='bx bxs-user-detail'></i>
                </div>
                <div class="input-box">
                    <input type="text" name="username" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" name="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button class="btn register-btn">Register</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn login-btn">Login</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.querySelector('.container');
        const registerBtn = document.querySelector('.register-btn');
        const loginBtn = document.querySelector('.login-btn');

        registerBtn.addEventListener('click', () => {
            container.classList.add('active');
        });

        loginBtn.addEventListener('click', () => {
            container.classList.remove('active');
        });
    </script>
</body>
</html>
