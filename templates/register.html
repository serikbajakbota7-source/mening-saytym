<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeSchool | Кіру және Тіркелу</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap");
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; text-decoration: none; }
        
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(90deg, #f4f1ea, #cae1d0); 
            padding: 20px;
        }

        .container { 
            position: relative; 
            width: 850px; 
            height: 550px; 
            background: #fff; 
            border-radius: 30px; 
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.2); 
            overflow: hidden; 
        }

        /* Формалар блогы */
        .form-box { 
            position: absolute; 
            right: 0; 
            width: 50%; 
            height: 100%; 
            background: #fff; 
            display: flex; 
            flex-direction: column;
            justify-content: center;
            padding: 40px; 
            z-index: 1; 
            transition: 0.6s ease-in-out; 
        }

        .container.active .form-box.login { transform: translateX(100%); opacity: 0; z-index: 0; }
        .form-box.register { transform: translateX(-100%); opacity: 0; z-index: 0; left: 0; }
        .container.active .form-box.register { transform: translateX(0); opacity: 1; z-index: 1; }

        .input-box { position: relative; margin: 15px 0; }
        .input-box input { 
            width: 100%; 
            padding: 12px 45px 12px 15px; 
            background: #f0f0f0; 
            border-radius: 10px; 
            border: none; 
            outline: none; 
            font-size: 15px; 
        }
        .input-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #4a5d4a; }

        .btn { 
            width: 100%; 
            padding: 12px; 
            background: #4a5d4a; 
            border-radius: 10px; 
            border: none; 
            cursor: pointer; 
            font-size: 16px; 
            color: #fff; 
            font-weight: 600; 
            margin-top: 10px;
        }
        .btn-start { 
            display: block;
            text-align: center;
            width: 100%;
            padding: 10px;
            background: #d4a373;
            color: white;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 14px;
        }

        /* Toggle Box (Desktop) */
        .toggle-box { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        .toggle-box::before { 
            content: ""; 
            position: absolute; 
            left: -250%; 
            width: 300%; 
            height: 100%; 
            background: #4a5d4a; 
            border-radius: 150px; 
            z-index: 2; 
            transition: 1.2s ease-in-out; 
            pointer-events: all;
        }
        .container.active .toggle-box::before { left: 50%; }

        .toggle-panel { 
            position: absolute; 
            width: 50%; 
            height: 100%; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 2; 
            transition: 0.6s ease-in-out; 
            text-align: center;
            padding: 0 30px;
            pointer-events: all;
        }
        .toggle-left { left: 0; }
        .container.active .toggle-left { left: -50%; }
        .toggle-right { right: -50%; }
        .container.active .toggle-right { right: 0; }

        .mobile-text { display: none; margin-top: 20px; font-size: 13px; text-align: center; }
        .mobile-text span { color: #d4a373; font-weight: 600; cursor: pointer; }

        /* ТЕЛЕФОНҒА АРНАЛҒАН АДАПТИВТІЛІК */
        @media (max-width: 768px) {
            .container { width: 100%; max-width: 400px; height: auto; min-height: 500px; border-radius: 20px; }
            .toggle-box { display: none; }
            .form-box { width: 100%; position: relative; padding: 30px; }
            
            /* Телефонда ауысқанда формалардың көрінуі */
            .form-box.register { display: none; transform: none; opacity: 1; position: relative; }
            .container.active .form-box.login { display: none; }
            .container.active .form-box.register { display: flex; }
            
            .mobile-text { display: block; }
            h1 { font-size: 22px; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-box login">
            <form action="/login" method="POST">
                <h1>Кіру</h1>
                <div class="input-box">
                    <input type="text" placeholder="Пайдаланушы аты" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Құпия сөз" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn">КІРУ</button>
                <a href="/home" class="btn-start">Тіркелмей өту</a>
                <p class="mobile-text">Аккаунтыңыз жоқ па? <span onclick="toggleForm()">Тіркелу</span></p>
            </form>
        </div>

        <div class="form-box register">
            <form action="/register_user" method="POST">
                <h1>Тіркелу</h1>
                <div class="input-box">
                    <input type="text" placeholder="Толық аты-жөн" required>
                    <i class='bx bxs-user-detail'></i>
                </div>
                <div class="input-box">
                    <input type="text" placeholder="Пайдаланушы аты" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Құпия сөз" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn">ТІРКЕЛУ</button>
                <p class="mobile-text">Аккаунтыңыз бар ма? <span onclick="toggleForm()">Кіру</span></p>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Сәлем!</h1>
                <p>Білім әлеміне қосылу үшін тіркеліңіз</p>
                <button class="btn" style="background:transparent; border:2px solid white; width:150px;" id="register-btn">Тіркелу</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Қош келдіңіз!</h1>
                <p>Жеке кабинетіңізге кіріңіз</p>
                <button class="btn" style="background:transparent; border:2px solid white; width:150px;" id="login-btn">Кіру</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.querySelector('.container');
        const registerBtn = document.getElementById('register-btn');
        const loginBtn = document.getElementById('login-btn');

        registerBtn.onclick = () => container.classList.add('active');
        loginBtn.onclick = () => container.classList.remove('active');

        function toggleForm() {
            container.classList.toggle('active');
        }
    </script>
</body>
</html>
